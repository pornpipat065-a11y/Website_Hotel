<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background-color: rgb(0, 0, 0);
        }
        .home {
            height: 675px;
            width: 100%;
            background : url("ภาพพื้นหลังหน้าHero Section.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .data {
            background-color: rgba(0, 0, 0, 0.503);
            color : white;
            padding : 10px;
            border-radius: 50px;
            transition: 0.9s;
        }
        .data:hover {
            transform: scale(1.05);
            box-shadow: 2px 2px 20px rgba(255, 0, 0, 0.447);
        }
        .button {
            text-align: center;
            padding-top: 15px;
        }
        .button a {
            margin : 10px;
            transition: 0.9s;
        }
        .button a:hover {
            background-color: aliceblue;
            color: black;
            border: 2px solid red;
            box-shadow: 2px 2px 20px rgb(251, 255, 6);
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">Hotel Phuket</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#Menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="Menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#rooms">Rooms</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#room delail">Room Detail</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#booking">Booking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li> <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="home" class="home">
        <div class="container">
            <div class="data">
                <h1 class="text-center">"Experience Luxury by the Andaman Sea"</h1>
                <p class="text-center">สัมผัสประสบการณ์การพักผ่อนระดับ 5 ดาว ใจกลางภูเก็ตวิวทะเลสุดโรแมนติกพร้อมบริการระดับพรีเมียม</p>
                <div class="button">
                    <a class="btn btn-primary" href="#booking">จองตอนนี้</a>
                    <a class="btn btn-primary" href="#Books">ดูห้องพัก</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
